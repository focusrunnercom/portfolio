<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g fill="#334155" opacity="0.3">
    <circle cx="200" cy="100" r="2"/><circle cx="400" cy="100" r="2"/>
    <circle cx="600" cy="100" r="2"/><circle cx="800" cy="100" r="2"/>
    <circle cx="1000" cy="100" r="2"/>
    <circle cx="200" cy="300" r="2"/><circle cx="400" cy="300" r="2"/>
    <circle cx="600" cy="300" r="2"/><circle cx="800" cy="300" r="2"/>
    <circle cx="1000" cy="300" r="2"/>
    <circle cx="200" cy="500" r="2"/><circle cx="400" cy="500" r="2"/>
    <circle cx="600" cy="500" r="2"/><circle cx="800" cy="500" r="2"/>
    <circle cx="1000" cy="500" r="2"/>
  </g>

  <!-- Hero pill -->
  <rect x="60" y="80" rx="20" ry="20" width="160" height="32" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="bold">AI PATIENT ACQUISITION</text>

  <!-- Main headline -->
  <text x="60" y="180" font-family="system-ui, sans-serif" font-size="72" fill="#f8fafc" font-weight="bold">AI books 15+</text>
  <text x="60" y="255" font-family="system-ui, sans-serif" font-size="72" fill="#f8fafc" font-weight="bold">patients per</text>
  <text x="60" y="330" font-family="system-ui, sans-serif" font-size="72" fill="#22c55e" font-weight="bold" filter="url(#glow)">month.</text>

  <!-- Subheadline -->
  <text x="60" y="390" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8">$2,500 setup. $2,500/month. 30-day guarantee.</text>

  <!-- CTA -->
  <rect x="60" y="430" rx="8" ry="8" width="300" height="56" fill="url(#accent)"/>
  <text x="210" y="465" font-family="system-ui, sans-serif" font-size="20" fill="#fff" font-weight="bold" text-anchor="middle">Book Your Free Audit →</text>

  <!-- Right panel: stats card -->
  <rect x="700" y="100" rx="16" ry="16" width="440" height="440" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Stat 1 -->
  <rect x="740" y="140" rx="8" ry="8" width="360" height="80" fill="#0f172a"/>
  <text x="760" y="170" font-family="system-ui, sans-serif" font-size="28" fill="#22c55e" font-weight="bold">40%</text>
  <text x="760" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">faster response time</text>

  <!-- Stat 2 -->
  <rect x="740" y="240" rx="8" ry="8" width="360" height="80" fill="#0f172a"/>
  <text x="760" y="270" font-family="system-ui, sans-serif" font-size="28" fill="#22c55e" font-weight="bold">3x</text>
  <text x="760" y="300" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">follow-up capacity</text>

  <!-- Stat 3 -->
  <rect x="740" y="340" rx="8" ry="8" width="360" height="80" fill="#0f172a"/>
  <text x="760" y="370" font-family="system-ui, sans-serif" font-size="28" fill="#22c55e" font-weight="bold">15+</text>
  <text x="760" y="400" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">booked consults per month</text>

  <!-- Stat 4 -->
  <rect x="740" y="440" rx="8" ry="8" width="360" height="60" fill="#0f172a"/>
  <text x="920" y="475" font-family="system-ui, sans-serif" font-size="16" fill="#22c55e" text-anchor="middle" font-weight="bold">★ Average med spa results</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="38" fill="none"/>
  <text x="60" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">focusrunner.io — AI lead qualification for med spas</text>
</svg>
