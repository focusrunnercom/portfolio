<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Background phone mockup -->
  <rect x="820" y="80" rx="24" ry="24" width="280" height="480" fill="#1a2332" stroke="#334155" stroke-width="2"/>
  <rect x="880" y="95" rx="12" ry="12" width="160" height="24" fill="#334155"/>
  <circle cx="920" cy="107" r="6" fill="#22c55e" opacity="0.6"/>

  <!-- Phone message bubbles -->
  <rect x="840" y="140" rx="8" ry="8" width="180" height="40" fill="#334155"/>
  <text x="850" y="166" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Is Botox pricing avail?</text>

  <rect x="840" y="190" rx="8" ry="8" width="200" height="40" fill="#334155"/>
  <text x="850" y="216" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">What's a consult cost here?</text>

  <rect x="840" y="240" rx="8" ry="8" width="160" height="40" fill="#334155"/>
  <text x="850" y="266" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Do you do CoolSculpting?</text>

  <rect x="840" y="290" rx="8" ry="8" width="190" height="40" fill="#334155"/>
  <text x="850" y="316" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Late openings tomorrow?</text>

  <rect x="840" y="340" rx="8" ry="8" width="170" height="40" fill="#334155"/>
  <text x="850" y="366" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">New patient deals rn?</text>

  <!-- Red X indicators on messages -->
  <text x="1030" y="166" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="bold">✕</text>
  <text x="1050" y="216" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="bold">✕</text>
  <text x="1010" y="266" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="bold">✕</text>
  <text x="1040" y="316" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="bold">✕</text>
  <text x="1020" y="366" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="bold">✕</text>

  <!-- Hero content -->
  <text x="60" y="140" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e" font-weight="bold" letter-spacing="4">FOCUSRUNNER AI</text>

  <!-- Main headline -->
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="68" fill="#f8fafc" font-weight="bold">Lost 70% of</text>
  <text x="60" y="280" font-family="system-ui, sans-serif" font-size="68" fill="#22c55e" font-weight="bold" filter="url(#glow)">your leads?</text>
  <text x="60" y="350" font-family="system-ui, sans-serif" font-size="52" fill="#f8fafc" font-weight="bold">We fix that.</text>

  <!-- Subheadline -->
  <text x="60" y="410" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">AI lead qualification. 90-second response. 24/7.</text>

  <!-- CTA -->
  <rect x="60" y="450" rx="8" ry="8" width="280" height="56" fill="url(#accent)"/>
  <text x="200" y="485" font-family="system-ui, sans-serif" font-size="20" fill="#0f172a" font-weight="bold" text-anchor="middle">Get Free Patient Audit</text>

  <!-- Guarantee badge -->
  <rect x="60" y="530" rx="16" ry="16" width="360" height="36" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <text x="240" y="553" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">15 qualified leads in 30 days or it's free</text>
</svg>
