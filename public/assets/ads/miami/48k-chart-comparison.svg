<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="chart-before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#f8fafc">
    <line x1="0" y1="200" x2="1080" y2="200" stroke-width="1"/>
    <line x1="0" y1="400" x2="1080" y2="400" stroke-width="1"/>
    <line x1="0" y1="600" x2="1080" y2="600" stroke-width="1"/>
    <line x1="0" y1="800" x2="1080" y2="800" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1080" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1080" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1080" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1080" stroke-width="1"/>
  </g>

  <!-- Headline -->
  <text x="540" y="140" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="72" fill="#f8fafc">
    $48,000/yr
  </text>
  <text x="540" y="190" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="24" fill="#94a3b8">
    lost to unanswered leads
  </text>

  <!-- Bar chart comparison -->
  <g transform="translate(200, 300)">

    <!-- Without AI bar -->
    <rect x="150" y="180" width="160" height="320" rx="8" fill="url(#chart-before)" opacity="0.7"/>
    <rect x="150" y="180" width="160" height="320" rx="8" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8"/>
    <text x="230" y="540" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="18" fill="#ef4444">Without AI</text>
    <text x="230" y="165" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="24" fill="#ef4444">28%</text>
    <text x="230" y="460" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="14" fill="#ef4444" opacity="0.7">reply rate</text>

    <!-- With AI bar -->
    <rect x="440" y="40" width="160" height="460" rx="8" fill="url(#chart-grad)"/>
    <rect x="440" y="40" width="160" height="460" rx="8" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="520" y="540" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="18" fill="#22c55e">With AI</text>
    <text x="520" y="25" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="24" fill="#22c55e">92%</text>
    <text x="520" y="460" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="14" fill="#22c55e" opacity="0.7">reply rate</text>

    <!-- X axis -->
    <line x1="100" y1="510" x2="650" y2="510" stroke="#334155" stroke-width="2"/>
  </g>

  <!-- Arrow / connector -->
  <g transform="translate(490, 680)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="500" font-size="18" fill="#22c55e">3.2x more consultations booked</text>
  </g>

  <!-- CTA -->
  <rect x="340" y="820" width="400" height="64" rx="32" fill="#22c55e"/>
  <text x="540" y="860" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="24" fill="#0a0a0a">
    Get Your Free Audit ⟶
  </text>

  <!-- Trust bar -->
  <text x="540" y="940" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="13" fill="#64748b">
    92% reply rate · 90 sec response · 15 leads in 30 days or setup is free
  </text>

  <!-- FocusRunner -->
  <text x="540" y="1000" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="300" font-size="14" fill="#475569" letter-spacing="4">
    FOCUSRUNNER
  </text>
</svg>
