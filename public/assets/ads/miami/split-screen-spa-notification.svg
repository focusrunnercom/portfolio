<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="spa-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="30%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="purple-ambient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="phone-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#spa-grad)"/>
  <rect x="0" y="0" width="540" height="1080" fill="url(#purple-ambient)"/>

  <!-- Split: Left panel - empty spa room -->
  <rect x="0" y="0" width="540" height="1080" fill="#1a1a2e"/>
  <rect x="0" y="0" width="540" height="1080" fill="url(#purple-ambient)"/>

  <!-- Treatment bed -->
  <rect x="130" y="520" width="280" height="140" rx="20" fill="#2d2d5e" opacity="0.6"/>
  <rect x="145" y="525" width="250" height="130" rx="15" fill="#3d3d6e" opacity="0.4"/>
  <rect x="160" y="540" width="220" height="100" rx="12" fill="#4d4d7e" opacity="0.3"/>

  <!-- Chair -->
  <rect x="240" y="460" width="60" height="80" rx="8" fill="#2d2d5e" opacity="0.5"/>
  <rect x="230" y="440" width="80" height="25" rx="12" fill="#3d3d6e" opacity="0.4"/>

  <!-- Warm light circle suggesting empty treatment room -->
  <circle cx="270" cy="350" r="120" fill="#f59e0b" opacity="0.05"/>

  <!-- Vertical divider -->
  <rect x="539" y="0" width="2" height="1080" fill="#22c55e" opacity="0.8"/>

  <!-- Right panel: Phone notification -->
  <rect x="540" y="0" width="540" height="1080" fill="#0a0a0a"/>

  <!-- Phone screen glow -->
  <rect x="200" y="0" width="200" height="1080" fill="url(#phone-glow)" opacity="0.1"/>

  <!-- Phone frame -->
  <rect x="680" y="320" width="260" height="520" rx="40" fill="#1c1c1e" stroke="#2c2c2e" stroke-width="2"/>
  <rect x="770" y="330" width="80" height="12" rx="6" fill="#1c1c1e"/>

  <!-- iOS lock screen -->
  <rect x="690" y="340" width="240" height="490" rx="20" fill="#000000"/>

  <!-- iOS time -->
  <text x="810" y="400" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="42" fill="#f8fafc">11:47 PM</text>

  <!-- Notification banner -->
  <rect x="700" y="460" width="220" height="100" rx="16" fill="#1c1c1e" stroke="#2c2c2e" stroke-width="0.5" filter="url(#glow)"/>
  <circle cx="720" cy="500" r="16" fill="#22c55e"/>
  <text x="725" y="505" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="11" fill="#f8fafc">FR</text>
  <text x="743" y="488" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="#f8fafc">FocusRunner AI</text>
  <text x="743" y="504" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="12" fill="#a0a0a0">New inquiry: Botox consult</text>
  <text x="743" y="518" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="11" fill="#8a8a8a">Miami Beach • Premium tier</text>

  <!-- Notification banner 2 -->
  <rect x="700" y="570" width="220" height="90" rx="16" fill="#1c1c1e" stroke="#2c2c2e" stroke-width="0.5"/>
  <circle cx="720" cy="610" r="16" fill="#22c55e"/>
  <text x="725" y="615" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="11" fill="#f8fafc">FR</text>
  <text x="743" y="598" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="#f8fafc">FocusRunner AI</text>
  <text x="743" y="614" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="12" fill="#a0a0a0">New inquiry: Laser resurfacing</text>
  <text x="743" y="628" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="11" fill="#8a8a8a">Coral Gables • VIP tier</text>

  <!-- Headline (spans both panels) -->
  <text x="540" y="120" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="60" fill="#f8fafc">
    Your spa closes at 6.
  </text>
  <text x="540" y="200" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="28" fill="#94a3b8">
    Your revenue doesn't have to.
  </text>

  <!-- CTA pill -->
  <rect x="390" y="910" width="300" height="56" rx="28" fill="#22c55e"/>
  <text x="540" y="945" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="500" font-size="22" fill="#0a0a0a">
    24/7 AI Lead Capture ⟶
  </text>

  <!-- FocusRunner -->
  <text x="540" y="1020" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="300" font-size="14" fill="#475569" letter-spacing="4">
    FOCUSRUNNER
  </text>
</svg>
