<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Background decorative circle -->
  <circle cx="900" cy="314" r="380" fill="#1e293b" opacity="0.15"/>
  <circle cx="900" cy="314" r="280" fill="#1e293b" opacity="0.1"/>

  <!-- Audit icon / document mock -->
  <g transform="translate(800, 120)">
    <!-- Document -->
    <rect x="0" y="0" rx="12" ry="12" width="280" height="360" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Checkmark seal -->
    <circle cx="140" cy="60" r="30" fill="url(#accent)" opacity="0.15"/>
    <text x="140" y="70" font-family="system-ui, sans-serif" font-size="32" fill="#22c55e" text-anchor="middle" font-weight="bold">✓</text>

    <!-- Lines on document -->
    <rect x="40" y="110" rx="4" ry="4" width="200" height="6" fill="#334155"/>
    <rect x="40" y="130" rx="4" ry="4" width="180" height="6" fill="#334155"/>
    <rect x="40" y="150" rx="4" ry="4" width="210" height="6" fill="#334155"/>

    <!-- Metrics boxes -->
    <rect x="40" y="180" rx="6" ry="6" width="90" height="50" fill="#0f172a" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="85" y="202" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="bold">68%</text>
    <text x="85" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Leak Rate</text>

    <rect x="150" y="180" rx="6" ry="6" width="90" height="50" fill="#0f172a" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="195" y="202" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="bold">$363</text>
    <text x="195" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Cost/Lead</text>

    <rect x="40" y="250" rx="6" ry="6" width="200" height="40" fill="#0f172a" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="140" y="275" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">$4,200/mo lost revenue</text>

    <!-- Signature line -->
    <line x1="40" y1="320" x2="180" y2="320" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <text x="40" y="342" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">FocusRunner AI Audit Report</text>
  </g>

  <!-- Left content -->
  <text x="60" y="120" font-family="system-ui, sans-serif" font-size="14" fill="#22c55e" font-weight="bold" letter-spacing="3">LIMITED TIME</text>

  <!-- Main headline -->
  <text x="60" y="200" font-family="system-ui, sans-serif" font-size="64" fill="#f8fafc" font-weight="bold">Free Patient</text>
  <text x="60" y="270" font-family="system-ui, sans-serif" font-size="64" fill="#22c55e" font-weight="bold" filter="url(#glow)">Acquisition</text>
  <text x="60" y="340" font-family="system-ui, sans-serif" font-size="64" fill="#f8fafc" font-weight="bold">Audit.</text>

  <!-- Description -->
  <text x="60" y="400" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">We'll analyze your current lead pipeline and show you</text>
  <text x="60" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">exactly how many patients you're losing — for free.</text>

  <!-- CTA -->
  <rect x="60" y="460" rx="8" ry="8" width="320" height="56" fill="url(#accent)"/>
  <text x="220" y="495" font-family="system-ui, sans-serif" font-size="20" fill="#0f172a" font-weight="bold" text-anchor="middle">Claim Your Free Audit →</text>

  <!-- Trust bar -->
  <text x="60" y="555" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">✓ No credit card required  ✓ 30-min analysis  ✓ Custom lead loss report</text>
</svg>
