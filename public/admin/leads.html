<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusRunner — Lead Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .header {
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d0d0d;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-logo {
      color: #6eff8a;
      font-weight: 700;
      font-size: 15px;
      font-family: 'JetBrains Mono', monospace;
    }
    .header-logo span { color: #f0f0f0; }
    .header-path {
      color: #444;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .pill {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      color: #888;
      background: #141414;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.15s;
    }
    .btn:hover { background: #222; border-color: #555; color: #f0f0f0; }
    .btn-danger { color: #f87171; }
    .btn-danger:hover { background: #2a1515; border-color: #f8717144; }
    .btn-primary {
      background: #6eff8a;
      color: #000;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ─── Main ─── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ─── Error Banner ─── */
    .error-banner {
      background: #2a1515;
      border: 1px solid #ff444444;
      border-radius: 8px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .error-banner .btn { border-color: #ff444444; color: #f87171; font-size: 12px; }

    /* ─── Filters ─── */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-group label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .filter-select, .filter-input {
      background: #141414;
      border: 1px solid #222;
      color: #f0f0f0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
    }
    .filter-select:focus, .filter-input:focus { border-color: #6eff8a44; }
    .filter-input[type="date"] { color-scheme: dark; }
    .filter-count {
      margin-left: auto;
      font-size: 12px;
      color: #555;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      border: 1px dashed #1a1a1a;
      border-radius: 12px;
      margin-top: 20px;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { color: #aaa; font-size: 18px; margin-bottom: 8px; font-weight: 600; }
    .empty-state p { color: #555; font-size: 13px; }

    /* ─── Table ─── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 14px;
      color: #555;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #1a1a1a;
      background: #0d0d0d;
      white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #141414;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(110, 255, 138, 0.02); }

    .cell-name {
      font-weight: 500;
      color: #f0f0f0;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell-contact { display: flex; flex-direction: column; gap: 2px; }
    .contact-chip {
      cursor: pointer;
      color: #60a5fa;
      font-size: 12px;
      padding: 1px 0;
      white-space: nowrap;
    }
    .contact-chip:hover { color: #93c5fd; text-decoration: underline; }
    .cell-practice {
      color: #aaa;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell-score { font-family: 'JetBrains Mono', monospace; color: #aaa; }
    .cell-source { color: #888; font-size: 12px; white-space: nowrap; }
    .cell-time { color: #555; font-size: 12px; white-space: nowrap; }

    /* ─── Badges ─── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge-hot      { background: #dc262622; color: #f87171;  border: 1px solid #dc262644; }
    .badge-warm     { background: #ea580c22; color: #fb923c;  border: 1px solid #ea580c44; }
    .badge-cold     { background: #2563eb22; color: #60a5fa;  border: 1px solid #2563eb44; }
    .badge-unknown  { background: #6b728022; color: #9ca3af;  border: 1px solid #6b728044; }

    /* ─── Auth Overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .auth-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 400px;
      width: 90%;
    }
    .auth-label {
      color: #6eff8a;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }
    .auth-box h1 {
      color: #f0f0f0;
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .auth-box p { color: #666; font-size: 13px; margin-bottom: 24px; }
    .auth-box input {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      outline: none;
      box-sizing: border-box;
      font-family: 'JetBrains Mono', monospace;
    }
    .auth-box input:focus { border-color: #6eff8a44; }
    .auth-box input.error { border-color: #ff4444; }
    .auth-error { color: #ff4444; font-size: 12px; margin: 8px 0 0; }
    .auth-box .btn-auth {
      width: 100%;
      margin-top: 16px;
      padding: 10px 0;
      background: #6eff8a;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .auth-box .btn-auth:hover { opacity: 0.9; }
    .auth-box .btn-auth:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Loading ─── */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: #666;
    }
    .loading .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
      font-size: 24px;
      margin-bottom: 12px;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #aaa;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .main { padding: 16px; }
      th, td { padding: 8px 10px; font-size: 12px; }
      .auth-box { padding: 32px 24px; }
      .filters { flex-direction: column; align-items: stretch; }
      .filter-group { flex-wrap: wrap; }
      .filter-count { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- ─── Auth Overlay ─── -->
  <div id="authOverlay" class="overlay" style="display:none;">
    <div class="auth-box">
      <div class="auth-label">&gt;_ ADMIN ACCESS</div>
      <h1>Lead Dashboard</h1>
      <p>Enter admin key to view submissions</p>
      <input type="password" id="authInput" placeholder="Admin key" autocomplete="off" />
      <div id="authError" class="auth-error" style="display:none;"></div>
      <button class="btn-auth" id="authBtn" onclick="handleAuth()">→ Access Dashboard</button>
    </div>
  </div>

  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-left">
      <span class="header-logo">&gt;_ <span>FocusRunner</span></span>
      <span class="header-path">/admin/leads</span>
    </div>
    <div class="header-right">
      <span class="pill" id="leadCount">0 leads</span>
      <button class="btn" onclick="fetchLeads()" title="Refresh">⟳ Refresh</button>
      <button class="btn btn-danger" onclick="handleLogout()">✕ Logout</button>
    </div>
  </header>

  <!-- ─── Main ─── -->
  <main class="main">
    <div id="errorBanner" class="error-banner" style="display:none;"></div>
    <div id="filtersWrap" style="display:none;"></div>
    <div id="mainContent"></div>
  </main>

  <!-- ─── Toast ─── -->
  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'fr_admin_key';
    const API_ENDPOINT = '/api/leads';

    /* ─── State ─── */
    let leads = [];
    let refreshInterval = null;
    let activeFilters = { classification: '', source: '', dateFrom: '', dateTo: '' };

    /* ─── Init ─── */
    function init() {
      const key = getKey();
      if (key) {
        hideOverlay();
        fetchLeads();
      } else {
        showOverlay();
      }
    }

    /* ─── Auth ─── */
    function getKey() { return sessionStorage.getItem(STORAGE_KEY) || ''; }
    function setKey(k) { sessionStorage.setItem(STORAGE_KEY, k); }

    function showOverlay() {
      document.getElementById('authOverlay').style.display = 'flex';
      document.getElementById('authInput').value = '';
      document.getElementById('authError').style.display = 'none';
      setTimeout(() => document.getElementById('authInput').focus(), 100);
    }

    function hideOverlay() {
      document.getElementById('authOverlay').style.display = 'none';
    }

    function handleAuth() {
      const input = document.getElementById('authInput');
      const err = document.getElementById('authError');
      const btn = document.getElementById('authBtn');
      const value = input.value.trim();

      if (!value) {
        input.classList.add('error');
        err.textContent = 'Enter admin key';
        err.style.display = 'block';
        return;
      }

      input.classList.remove('error');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      fetch(API_ENDPOINT, {
        headers: { 'Authorization': `Bearer ${value}` }
      })
      .then(res => {
        btn.disabled = false;
        btn.textContent = '→ Access Dashboard';
        if (res.status === 401) {
          input.classList.add('error');
          err.textContent = 'Invalid admin key';
          err.style.display = 'block';
          return;
        }
        if (!res.ok) {
          input.classList.add('error');
          err.textContent = `Server error (${res.status})`;
          err.style.display = 'block';
          return;
        }
        setKey(value);
        hideOverlay();
        fetchLeads();
      })
      .catch(e => {
        btn.disabled = false;
        btn.textContent = '→ Access Dashboard';
        input.classList.add('error');
        err.textContent = `Network error: ${e.message}`;
        err.style.display = 'block';
      });
    }

    document.getElementById('authInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleAuth();
    });

    /* ─── Logout ─── */
    function handleLogout() {
      sessionStorage.removeItem(STORAGE_KEY);
      if (refreshInterval) clearInterval(refreshInterval);
      leads = [];
      document.getElementById('mainContent').innerHTML = '';
      document.getElementById('filtersWrap').innerHTML = '';
      document.getElementById('filtersWrap').style.display = 'none';
      document.getElementById('leadCount').textContent = '0 leads';
      showOverlay();
    }

    /* ─── Fetch ─── */
    function fetchLeads() {
      const key = getKey();
      if (!key) { showOverlay(); return; }

      const errorBanner = document.getElementById('errorBanner');
      errorBanner.style.display = 'none';

      fetch(API_ENDPOINT, {
        headers: { 'Authorization': `Bearer ${key}` }
      })
      .then(res => {
        if (res.status === 401) {
          sessionStorage.removeItem(STORAGE_KEY);
          showOverlay();
          return null;
        }
        if (!res.ok) {
          showError(`Server error (${res.status})`);
          return null;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;
        leads = data.leads || [];
        renderFilters();
        applyFilters();
      })
      .catch(e => {
        showError(`Network error: ${e.message}`);
      });
    }

    /* ─── Render Filters ─── */
    function renderFilters() {
      const wrap = document.getElementById('filtersWrap');
      wrap.style.display = 'block';

      // Collect unique sources
      const sources = new Set();
      leads.forEach(l => { if (l.source) sources.add(l.source); });
      const sourceOptions = Array.from(sources).sort();

      wrap.innerHTML = `
        <div class="filters">
          <div class="filter-group">
            <label>Status</label>
            <select class="filter-select" id="filterClass" onchange="updateFilter('classification', this.value)">
              <option value="">All</option>
              <option value="hot">Hot</option>
              <option value="warm">Warm</option>
              <option value="cold">Cold</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Source</label>
            <select class="filter-select" id="filterSource" onchange="updateFilter('source', this.value)">
              <option value="">All</option>
              ${sourceOptions.map(s => `<option value="${escAttr(s)}">${esc(s)}</option>`).join('')}
            </select>
          </div>
          <div class="filter-group">
            <label>From</label>
            <input type="date" class="filter-input" id="filterDateFrom" onchange="updateFilter('dateFrom', this.value)" />
          </div>
          <div class="filter-group">
            <label>To</label>
            <input type="date" class="filter-input" id="filterDateTo" onchange="updateFilter('dateTo', this.value)" />
          </div>
          <div class="filter-count" id="filterCount"></div>
        </div>
      `;
    }

    function updateFilter(key, value) {
      activeFilters[key] = value;
      applyFilters();
    }

    /* ─── Apply Filters ─── */
    function applyFilters() {
      let filtered = [...leads];

      // Classification filter
      if (activeFilters.classification) {
        filtered = filtered.filter(l =>
          (l.classification || 'unknown').toLowerCase() === activeFilters.classification
        );
      }

      // Source filter
      if (activeFilters.source) {
        filtered = filtered.filter(l => l.source === activeFilters.source);
      }

      // Date range filter
      if (activeFilters.dateFrom) {
        const from = new Date(activeFilters.dateFrom + 'T00:00:00');
        filtered = filtered.filter(l => new Date(l.timestamp) >= from);
      }
      if (activeFilters.dateTo) {
        const to = new Date(activeFilters.dateTo + 'T23:59:59');
        filtered = filtered.filter(l => new Date(l.timestamp) <= to);
      }

      render(filtered);
    }

    /* ─── Render ─── */
    function render(displayLeads) {
      const container = document.getElementById('mainContent');
      const countEl = document.getElementById('leadCount');
      const filterCountEl = document.getElementById('filterCount');
      const total = leads.length;
      const shown = displayLeads.length;

      countEl.textContent = `${total} lead${total !== 1 ? 's' : ''}`;
      if (filterCountEl) {
        filterCountEl.textContent = shown < total ? `${shown} of ${total} shown` : `${total} total`;
      }

      if (total === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h2>No leads yet</h2>
            <p>Leads from the chatbot and webhook will appear here automatically.</p>
          </div>`;
        return;
      }

      if (shown === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h2>No leads match filters</h2>
            <p>Try adjusting your filter criteria.</p>
          </div>`;
        return;
      }

      let html = `<div class="table-wrap"><table>
        <thead><tr>
          <th>Name</th>
          <th>Contact</th>
          <th>Practice</th>
          <th>Status</th>
          <th>Score</th>
          <th>Source</th>
          <th>Time</th>
        </tr></thead><tbody>`;

      for (const lead of displayLeads) {
        html += `<tr>
          <td class="cell-name">${esc(lead.name) || '—'}</td>
          <td class="cell-contact">${renderContact(lead)}</td>
          <td class="cell-practice">${esc(lead.practice) || '—'}</td>
          <td>${renderBadge(lead.classification)}</td>
          <td class="cell-score">${lead.score || 0}/100</td>
          <td class="cell-source">${renderSource(lead.source)}</td>
          <td class="cell-time">${formatTime(lead.timestamp)}</td>
        </tr>`;
      }

      html += '</tbody></table></div>';
      container.innerHTML = html;

      // Set up auto-refresh (30s)
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(fetchLeads, 30000);
    }

    /* ─── Helpers ─── */
    function esc(s) {
      if (typeof s !== 'string') return String(s || '');
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(s) {
      if (typeof s !== 'string') return String(s || '');
      return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderContact(lead) {
      let html = '';
      if (lead.phone) {
        html += `<span class="contact-chip" onclick="copyText('${esc(lead.phone)}')">📞 ${esc(lead.phone)}</span>`;
      }
      if (lead.email) {
        html += `<span class="contact-chip" onclick="copyText('${esc(lead.email)}')">✉ ${esc(lead.email)}</span>`;
      }
      if (!lead.phone && !lead.email) html += '<span style="color:#444">—</span>';
      return html;
    }

    function renderBadge(cls) {
      const c = (cls || 'unknown').toLowerCase();
      const label = (cls || 'UNKNOWN').toUpperCase();
      const b = { hot: 'badge-hot', warm: 'badge-warm', cold: 'badge-cold' };
      return `<span class="badge ${b[c] || 'badge-unknown'}">${label}</span>`;
    }

    function renderSource(src) {
      const icons = { chat_widget: '💬', webhook: '🔗', lead_form: '📝', test: '🧪' };
      const icon = icons[src] || '📋';
      return `<span title="${esc(src)}">${icon} ${esc(src.replace(/_/g, ' '))}</span>`;
    }

    function formatTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHrs = Math.floor(diffMins / 60);
      if (diffHrs < 24) return `${diffHrs}h ago`;
      const diffDays = Math.floor(diffHrs / 24);
      if (diffDays < 7) return `${diffDays}d ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    /* ─── Clipboard ─── */
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.textContent = `✓ Copied: ${text}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }).catch(() => {});
    }

    /* ─── Error ─── */
    function showError(msg) {
      const banner = document.getElementById('errorBanner');
      banner.style.display = 'flex';
      banner.innerHTML = `${esc(msg)} <button class="btn" onclick="fetchLeads()" style="margin-left:auto;">Retry</button>`;
    }

    /* ─── Boot ─── */
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
